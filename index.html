<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ROAS Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <h1>ROAS Calculator</h1>
      <p class="subtitle">Add channel performance rows and compare ROAS instantly.</p>

      <!-- Form for adding a new row -->
      <form id="roas-form" class="form" novalidate>
        <label for="channel">Channel</label>
        <input id="channel" name="channel" type="text" placeholder="e.g. Google Ads" required />

        <label for="cost">Cost</label>
        <input id="cost" name="cost" type="number" min="0.01" step="0.01" placeholder="e.g. 1000" required />

        <label for="revenue">Revenue</label>
        <input id="revenue" name="revenue" type="number" min="0" step="0.01" placeholder="e.g. 2500" required />

        <button type="submit">Add row</button>
      </form>

      <!-- Inline validation / status text (no alerts) -->
      <p id="message" class="message" aria-live="polite"></p>

      <section class="table-section">
        <div class="table-actions">
          <button id="sort-button" type="button">Sort by ROAS: Desc</button>
          <button id="copy-summary" type="button">Copy Summary</button>
          <button id="export-csv" type="button">Export CSV</button>
        </div>

        <table>
          <thead>
            <tr>
              <th>Channel</th>
              <th>Cost</th>
              <th>Revenue</th>
              <th>ROAS</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="rows-body">
            <tr id="empty-row">
              <td colspan="5">No rows yet. Add your first channel above.</td>
            </tr>
          </tbody>
        </table>

        <!-- Totals required under the table -->
        <div class="totals">
          <p><strong>Total Cost:</strong> <span id="total-cost">0.00</span></p>
          <p><strong>Total Revenue:</strong> <span id="total-revenue">0.00</span></p>
          <p><strong>Overall ROAS:</strong> <span id="overall-roas">0.00</span></p>
        </div>
      </section>

      <!-- Existing best/worst summary -->
      <section class="summary">
        <h2>Summary</h2>
        <p><strong>Best channel:</strong> <span id="best-channel">N/A</span></p>
        <p><strong>Worst channel:</strong> <span id="worst-channel">N/A</span></p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
